<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruang Rapat | E-Rapat Unsam</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/config.js" defer></script>
  <script src="js/room.js" defer></script>
</head>
<body>
  <header>
    <div class="container flex-between">
      <div class="logo">📑 Ruang Rapat</div>
      <div class="flex-gap">
        <span id="userEmail" class="hint"></span>
        <a href="index.html" class="btn btn-outline">← Dashboard</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="flex-between" style="margin-bottom:16px;">
      <div>
        <h2 id="roomTitle" style="margin-bottom:4px;">Memuat...</h2>
        <div class="flex-gap">
          <span class="badge" id="roomCode">----</span>
          <span id="statusBadge" class="status">● Live</span>
        </div>
      </div>
      <div class="flex-gap notulen-only" style="display:none;">
        <button onclick="exportPDF()" class="btn btn-outline">📄 Export PDF</button>
        <button onclick="exportCSV()" class="btn btn-outline">📊 Export CSV</button>
      </div>
    </div>

    <div class="room-grid">
      <!-- Peserta -->
      <div class="card">
        <h3>👥 Peserta Hadir</h3>
        <ul id="attendeeList" class="attendee-list"></ul>
        <button id="attendBtn" class="btn btn-primary full-width">✅ Saya Hadir</button>
      </div>

      <!-- Catatan -->
      <div class="card" id="notesSection">
        <div id="editor" style="height:400px;"></div>
        <p class="hint notulen-only" style="display:none; margin-top:8px;">* Notulensi tersimpan otomatis secara real-time</p>
      </div>

      <!-- Dokumentasi -->
      <div class="card">
        <h3>📎 Dokumentasi</h3>
        <div id="dropZone" class="drop-zone">
          <p>Drag & drop atau <label class="upload-label">pilih file<input type="file" id="fileInput" hidden></label></p>
        </div>
        <ul id="fileList" class="file-list"></ul>
      </div>
    </div>
  </main>
</body>
</html>
